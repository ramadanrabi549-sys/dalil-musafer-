<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دليل المسافر Pro</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --primary: #007AFF; --secondary: #FF3B30; --dark: #1C1C1E; --light: #F2F2F7; --card: #FFFFFF; --text: #000; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; }
    body { background: var(--light); color: var(--text); line-height: 1.6; }
    .header { background: linear-gradient(135deg, var(--primary), #5AC8FA); color: white; padding: 60px 20px 30px; text-align: center; }
    .header h1 { font-size: 2rem; font-weight: 800; }
    .header p { opacity: 0.9; margin-top: 8px; }
    .tabs { display: flex; justify-content: space-around; background: var(--card); padding: 12px 0; position: sticky; top: 0; }
    .tab { text-align: center; font-size: 0.75rem; color: var(--text-light); cursor: pointer; }
    .tab.active { color: var(--primary); font-weight: 600; }
    .tab-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .content { padding: 20px; }
    .section-title { font-size: 1.3rem; font-weight: 700; margin: 25px 0 15px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>دليل المسافر Pro</h1>
    <p>كل اللي تحتاجه للسفر في تطبيق واحد</p>
  </div>
  
  <div class="tabs">
    <div class="tab active"><span class="tab-icon">🏠</span><span>فنادق</span></div>
    <div class="tab"><span class="tab-icon">✈️</span><span>طيران</span></div>
    <div class="tab"><span class="tab-icon">🗺️</span><span>وجهات</span></div>
  </div>

  <div class="content">
    <h2 class="section-title">أهلاً بيك في دليل المسافر</h2>
    <p>التطبيق جاهز للتثبيت دلوقتي 🚀</p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
